sonar.projectKey=demo-project
sonar.projectName=Demo Project
sonar.organization=demo-org

# Point to your SonarQube server (replace with your instance)
sonar.host.url=https://sonarqube.example.com

# Use a secure token. Replace this placeholder or configure via CI credentials.
sonar.login=REPLACE_WITH_SONAR_TOKEN

# Path to source code (path for amber)
sonar.sources=java/console/src/,java/common/src,java/core/src
sonar.java.binaries=java/console/classes/

# Specifically exclude directories and files
sonar.exclusions=**/docker/**,**/jenkins/**,**/.jenkins/**,**/.console/**,**/server/**,**/*.md,**/*.js,**/*.css,**/*.yml,**/*.yaml 

# Include only Java files
sonar.inclusions=**/*.java
